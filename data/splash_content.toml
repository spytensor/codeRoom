# Right-column copy for the boot splash.
#
# `tips.items` is the static "tips for getting started" block — refresh
# it whenever the surface area changes meaningfully.
#
# `whats_new` is a list ordered newest-first. The splash picks the entry
# whose `version` matches the current `CARGO_PKG_VERSION`; if no exact
# match exists it falls back to the head of the list. Add a new entry
# at the top for each release.

[tips]
items = [
  "type @role to send a task to a specific role",
  "/patch <role> persists a correction across refreshes",
  "/journal <role> captures today's lessons-learned",
]

