name: Release

# Triggered by pushing a `v*.*.*` tag from main. Builds release binaries
# for the supported platforms and uploads them as assets on the matching
# GitHub Release, creating it first when the tag does not have one yet.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # rc / pre-releases

permissions:
  contents: write  # needed to upload release assets

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x86_64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_suffix: linux-aarch64
            use_cross: true
          # Both macOS targets cross-compile from macos-latest (aarch64
          # native + xcode SDK that ships x86_64 stubs). Using macos-13
          # for x86_64 was unreliable — those runners queue for a long
          # time when there's contention.
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_suffix: macos-x86_64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Activate pinned toolchain
        run: cargo --version

      - name: Add target
        if: matrix.use_cross == false
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          tag="${GITHUB_REF##*/}"
          stage="cr-${tag}-${{ matrix.archive_suffix }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/cr" "$stage/cr"
          cp "$stage/cr" "$stage/croom"
          cp LICENSE README.md CHANGELOG.md "$stage/"
          tar -czf "$stage.tar.gz" "$stage"
          shasum -a 256 "$stage.tar.gz" > "$stage.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: cr-${{ matrix.archive_suffix }}
          path: |
            cr-*-${{ matrix.archive_suffix }}.tar.gz
            cr-*-${{ matrix.archive_suffix }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: List staged artifacts
        run: ls -la dist/
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF##*/}"
          release_args=(--repo "$GITHUB_REPOSITORY" --verify-tag --title "$tag" --generate-notes)

          if [[ "$tag" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" "${release_args[@]}"
          fi

          gh release upload "$tag" dist/cr-*.tar.gz dist/cr-*.tar.gz.sha256 \
            --repo "$GITHUB_REPOSITORY" --clobber

  npm:
    name: publish to npm
    needs: publish  # ensure release assets are live before postinstall would download them
    runs-on: ubuntu-latest
    # Skip if NPM_TOKEN isn't configured — the GitHub Release alone is
    # already a valid distribution channel.
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync package version with tag
        working-directory: npm
        run: |
          tag="${GITHUB_REF##*/}"        # v0.1.1
          version="${tag#v}"              # 0.1.1
          # Update version field in place without npm version bumping git.
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${version}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          cat package.json | head -5
      - name: Publish
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
