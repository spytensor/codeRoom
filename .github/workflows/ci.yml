name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch — saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins channel + components (rustfmt, clippy);
      # the first cargo invocation activates them.
      - name: Activate pinned toolchain
        run: cargo --version
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - name: Activate pinned toolchain
        run: cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Activate pinned toolchain
        run: cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}
      # NOTE: --locked is intentionally omitted until Cargo.lock lands with
      # the first vertical slice (CC adapter). Re-enable once Cargo.lock is
      # committed so dependency resolution becomes reproducible across CI runs.
      - name: Build
        run: cargo build --all-targets
      - name: Test
        # Ignored tests touch real CLI engines; CI runs only fast unit/integration
        # tests by default. A separate workflow_dispatch job will run real-engine
        # tests when explicitly requested (added once tests exist).
        run: cargo test --all-features

  shellcheck:
    name: shellcheck (spike scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on spike harness
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck spike/*.sh
