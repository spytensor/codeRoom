name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch — saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # rust-toolchain.toml pins channel + components (rustfmt, clippy);
      # the first cargo invocation activates them.
      - name: Activate pinned toolchain
        run: cargo --version
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - name: Activate pinned toolchain
        run: cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
          cache-bin: false
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Activate pinned toolchain
        run: cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}
          cache-bin: false
      - name: Build
        run: cargo build --all-targets --locked
      - name: Test
        # Ignored tests touch real CLI engines; CI runs only fast unit/integration
        # tests by default. A separate workflow_dispatch job will run real-engine
        # tests when explicitly requested (added once tests exist).
        run: cargo test --all-features --locked

  shellcheck:
    name: shellcheck (spike scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck on spike harness
        # -S warning: ignore style/info-level findings. The spike scripts use
        # several patterns that are deliberate (literal backticks in prompts,
        # `cat $f |` to keep stdin open, sed line-prefix) and noisy at the
        # info level. We still gate on warning-and-above.
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -S warning spike/*.sh
