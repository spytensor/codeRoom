name: Integration

# Manual / scheduled job — never runs on push or PR because each
# invocation hits real APIs and burns tokens.
on:
  schedule:
    # Sundays 04:17 UTC. Real-engine drift is expensive but should not
    # depend on someone remembering to click workflow_dispatch.
    - cron: '17 4 * * 0'
  workflow_dispatch:
    inputs:
      engines:
        description: 'Engines to test (comma-separated: cc,codex,gemini)'
        required: false
        default: 'cc,codex,gemini'
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SMOKE_ENGINES: ${{ github.event.inputs.engines || 'cc,codex,gemini' }}

jobs:
  integration:
    name: real-engine smoke (${{ github.event.inputs.engines || 'cc,codex,gemini' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Activate pinned toolchain
        run: cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration
          cache-bin: false

      # Engine CLIs are installed only if requested. Each step is gated on
      # the input string containing the engine name, so a single-engine
      # invocation does not pay the install cost for the others.
      - name: Install Claude Code
        if: contains(env.SMOKE_ENGINES, 'cc')
        run: npm install -g @anthropic-ai/claude-code
      - name: Install Codex CLI
        if: contains(env.SMOKE_ENGINES, 'codex')
        run: npm install -g @openai/codex
      - name: Install Gemini CLI
        if: contains(env.SMOKE_ENGINES, 'gemini')
        run: npm install -g @google/gemini-cli

      - name: cc smoke
        if: contains(env.SMOKE_ENGINES, 'cc')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cargo test --test cc_adapter_smoke -- --ignored --nocapture

      - name: codex smoke
        if: contains(env.SMOKE_ENGINES, 'codex')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: cargo test --test codex_adapter_smoke -- --ignored --nocapture

      - name: gemini smoke
        if: contains(env.SMOKE_ENGINES, 'gemini')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: cargo test --test gemini_adapter_smoke -- --ignored --nocapture
